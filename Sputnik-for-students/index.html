<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="1200">
    <title>Document</title>

    <link rel="stylesheet" href="css/jquery.fancybox.min.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/slick.css">
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header class="header">
        <div class="container header__row">
            <div class="header__logo">
                <img src="images/sputnik-logo.svg" alt="Sputnik"> 
            </div>
        
            <ul class="header__menu">
                <li><a href="#">Каталог</a></li>
                <li><a href="#">О компании</a></li>
                <li><a href="#">Доставка и оплата</a></li>
                <li><a href="#">Где купить Sputnik</a></li>
            </ul>

            <div class="header__right">
                <a href="tel:+74952884424" class="header__phone">+7 (495) 288-44-24</a>
                <a href="#" class="header__cart">
                    <img src="images/cart.svg" alt="cart" width="32">
                    <span>3</span>
                </a>
            </div>
        </div>
        
    </header>

    <!-- slider -->
    <section class="topslider">
      <div class="topslider__list js-topslider">
        <div class="topslider__slide">
          <div class="container topslider__slide-row">
            <div class="topslider__slide-text">
              <div class="topslider__slide-title">Новый взгляд <div>на привычные вещи</div></div>
              <a href="#" class="topslider__slide-btn btn">Посмотреть</a>
            </div>
            <div class="topslider__slide-photo"><img src="images/slider/slide-1.jpg" alt=""></div>
          </div>
        </div>

        <div class="topslider__slide">
          <div class="container topslider__slide-row">
            <div class="topslider__slide-text">
              <div class="topslider__slide-title">Желтый цвет <div>всегда в моде</div></div>
              <a href="#" class="topslider__slide-btn btn">Посмотреть</a>
            </div>
            <div class="topslider__slide-photo"><img src="images/slider/slide-2.jpg" alt=""></div>
          </div>
        </div>

        <div class="topslider__slide">
          <div class="container topslider__slide-row">
            <div class="topslider__slide-text">
              <div class="topslider__slide-title">Скидки 25% <div>на летнюю коллекцию</div></div>
              <a href="#" class="topslider__slide-btn btn">Посмотреть</a>
            </div>
            <div class="topslider__slide-photo"><img src="images/slider/slide-3.jpg" alt=""></div>
          </div>
        </div>
      </div>   
    </section><!-- END slider -->

   <!-- catalog -->
    <section class="section section--grey">
      <div class="container">
        <div class="catalog">
          <a href="#" class="catalog__item category-1">
            <div class="catalog__item-title">Тоут</div>
          </a>
          <a href="#" class="catalog__item category-2">
            <div class="catalog__item-title">Рюкзаки </div>
          </a>
          <a href="#" class="catalog__item category-3">
            <div class="catalog__item-title">Поясные</div>
          </a>
          <a href="#" class="catalog__item category-4">
            <div class="catalog__item-title">Роллтоп</div>
          </a>
          <a href="#" class="catalog__item category-5">
            <div class="catalog__item-title">Кросс-боди</div>
          </a>
          <a href="#" class="catalog__more">
            <span>Смотреть <br>всю коллекцию</span>
            <svg width="38" height="34" viewBox="0 0 38 34" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="0.352905" y1="17" x2="35.647" y2="17" stroke="#999999" stroke-width="2"/>
              <path d="M22.8529 1.5L36.5294 17L22.8529 32.5" stroke="#999999" stroke-width="2"/>
            </svg>
          </a>
        </div>
      </div>
    </section><!-- END catalog -->


    <script src="js/jquery-3.5.1.min.js"></script>
    <script src="js/jquery.fancybox.min.js"></script>
    <script src="js/slick.min.js"></script>
</body>
</html>
